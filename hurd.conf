# hurd.conf — which device drivers get compiled into alpacahurd.
#
# One Go package import path per line. Comment a line out (#) to drop that
# driver from the build; add a third-party driver by appending its public
# module path. Then rebuild:
#
#   make            # regenerates drivers_gen.go from this file and builds
#
# To pin a driver to a specific version, run `go get <module>@<version>`
# after `make gen`. The simulated devices (sim-*) are always compiled in.
#
# A driver package qualifies by registering itself with
# github.com/mikefsq/goalpaca/registry in init() — see DRIVERS.md.

